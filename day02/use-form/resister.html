<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>"User Registration</title>
        <h1>"User Registration</h1>
    </head>
    <body>
        <form action="/submit" method="POST">
            <div>
               <h3>사용자의 이름: </h3> 
               <input type="text" name="username" placeholder="사용자의 이름">
               <br>
            </div>
            <div>
               <h3>이메일 입력: </h3>
               <input type="email" name="email" placeholder="사용자의 이메일 주소">
               <br>
            </div>
            <div>
               <h3>비밀번호 입력: </h3>
               <input type="password" name="password" placeholder="비밀번호">
               <br>
            </div>
            <div>
               <h3>생년월일 입력: </h3>
               <input type="date" name="date" placeholder="생년월일">
               <br>
            </div> 
            <div>
               <h3>나이 입력: </h3>
               <input type="number" name="age" min="18" max="100" />
               <br>
            </div> 
            <div>
               <h3>만족도 입력: </h3>
               <input type="range" name="range" min="1" max="10" />
               <br>
            </div>
            <div>
               <h3>성별 선택: </h3>
               <input type="radio" name="gender" value="male"> 남성
               <input type="radio" name="gender" value="female"> 여성
               <input type="radio" name="gender" value="other"> 다른 것
            </div>
            <div>
               <h3>관심사 선택: </h3>
               <input type="checkbox" name="hobby" value="Coding"> 코딩
               <input type="checkbox" name="hobby" value="Gaming"> 게임
               <input type="checkbox" name="hobby" value="Reading"> 읽기
            </div>
            <div>
               <h3>국가 선택: </h3>
               <input type="select" name="option" value="South Korea"> 한국
               <input type="select" name="option" value="USA"> 미국
               <input type="select" name="option" value="Japan"> 일본
               <input type="select" name="option" value="China"> 중국
               <input type="select" name="option" value="UK"> 영국
            </div>
            <hr>
            <button type="submit">제출 버튼</button>
            <button type="reset">초기화 버튼</button>
        </form>
   </body>
</html>
